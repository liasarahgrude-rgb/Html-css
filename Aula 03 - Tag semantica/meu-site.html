<!-- Vamos começar criando a base do nosso mini site! Crie uma pasta chamada meu-site. 
 Dentro dela, crie uma subpasta chamada assets. Dentro da pasta assets, crie outra pasta chamada css. 
 Dentro da pasta meu-site, crie um arquivo chamado index.html e outro chamado style.css dentro de assets/css/. 
 No arquivo index.html, crie a estrutura básica do HTML com a tag <head> e <body>. 
 Ligue o CSS externo usando a tag <link>. No corpo, escreva “Bem-vindo ao meu mini site!”. 
 Dica: Use o caminho href="assets/css/style.css" para conectar o CSS. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Aula 03 - Tag semantica/src/css/style.css">
    <title>Document</title>
</head>
<body>    
    <h1>Bem vindo ao meu mini site!</h1>
</body>
</html>
