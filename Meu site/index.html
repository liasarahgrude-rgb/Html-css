<!-- Chegou a hora de juntar tudo o que aprendemos! 
Você vai criar um mini site completo, com pelo menos três páginas navegáveis e estrutura organizada: 
Estrutura de pastas: meu-site/ ├── index.html ├── pages/ │ ├── sobre.html │ └── contato.html └── assets/ └── css/ └── style.css 
Use as tags semânticas principais: <header>, <nav>, <main>, <section>, <footer>. 
Use caminhos relativos corretos (../ quando estiver dentro da pasta pages). 

No index.html, adicione uma imagem e um vídeo do YouTube com <figure> e <iframe>. 
No sobre.html, adicione uma citação com <blockquote> e <cite>. 
No contato.html, adicione um mapa do Google Maps com <iframe>. -->
