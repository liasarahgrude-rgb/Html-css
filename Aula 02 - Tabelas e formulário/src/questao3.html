<!-- Crie um único arquivo HTML chamado contato.html. 
 Defina a estrutura de um formulário (<form>). 
Crie um campo de entrada (<input>) para o Nome (type="text"). 
Crie um campo de entrada (<input>) para o E-mail (type="email"). 
Crie um campo de texto longo (<textarea>) para a Mensagem. 
Para cada campo, use a tag <label> e conecte-a ao respectivo <input> ou <textarea> usando os atributos for e id. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h2>formulario </h2>
        <label for="nome">Nome:
            <input type="text" placeholder="Digite seu nome" id="nome">
        </label>
        <label for="">Email
            <input type="email" placeholder="Digite seu email">
        </label>
        <textarea name="" id="" cols="30" rows="10"></textarea>
</body>
</html>
