<!-- Crie um exemplo simples utilizando os dois tipos de listas (<ul>, <ol>). -->
<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
</head>
<body>
        <ul>
            <h2> Aparelhos eletrônicos que possuo: </h2>
            <li>Celular</li>
            <li>Tablet</li>
            <li>Computador</li>
            <li>Fone de ouvido</li>
        </ul>
        <ol type = "i">
            <h2> Aplicativos que mais uso: </h2>
            <li>Instagram</li>
            <li>WhatsApp</li>
            <li>Tik tok</li>
            <li>Vs code</li>
        </ol>
</body>
</html>
